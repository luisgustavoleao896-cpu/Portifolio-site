<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Netflix Clone | Luis Gustavo</title>

<style>
* {margin:0; padding:0; box-sizing:border-box; font-family:Inter, system-ui;}
body {background:#141414; color:white;}

header {
  padding:20px;
  font-size:24px;
  color:red;
  font-weight:bold;
}

.banner {
  height:70vh;
  background-size:cover;
  display:flex;
  align-items:flex-end;
  padding:40px;
}

.banner-content h1 {font-size:3rem;}
.banner-content p {max-width:500px; margin-top:10px;}

.row {padding:20px;}
.row h2 {margin-bottom:10px;}

.movies {
  display:flex;
  gap:10px;
  overflow-x:auto;
}

.movies img {
  width:150px;
  border-radius:6px;
  transition:0.3s;
  cursor:pointer;
}

.movies img:hover {
  transform:scale(1.15);
}

.modal {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content {
  background:#181818;
  padding:20px;
  border-radius:10px;
  max-width:500px;
}

.close {
  cursor:pointer;
  float:right;
  font-size:20px;
}

::-webkit-scrollbar {display:none;}
</style>
</head>

<body>

<header>NETFLIX</header>

<div class="banner" id="banner">
  <div class="banner-content">
    <h1 id="title"></h1>
    <p id="desc"></p>
  </div>
</div>

<div class="row">
  <h2>🔥 Em Alta</h2>
  <div class="movies" id="row1"></div>
</div>

<div class="row">
  <h2>⭐ Mais Bem Avaliados</h2>
  <div class="movies" id="row2"></div>
</div>

<!-- Modal -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>
    <h2 id="modal-title"></h2>
    <p id="modal-desc"></p>
  </div>
</div>

<script>
const movies = [
  {
    title: "Interstellar",
    desc: "Exploração espacial em busca de um novo lar.",
    img: "https://image.tmdb.org/t/p/w300/nBNZadXqJSdt05SHLqgT0HuC5Gm.jpg",
    banner: "https://image.tmdb.org/t/p/original/rAiYTfKGqDCRIIqo664sY9XZIvQ.jpg"
  },
  {
    title: "Batman",
    desc: "O cavaleiro das trevas combate o crime.",
    img: "https://image.tmdb.org/t/p/w300/74xTEgt7R36Fpooo50r9T25onhq.jpg",
    banner: "https://image.tmdb.org/t/p/original/3CxUndGhUcZdt1Zggjdb2HkLLQX.jpg"
  },
  {
    title: "Avengers",
    desc: "Heróis unidos para salvar o mundo.",
    img: "https://image.tmdb.org/t/p/w300/qAZ0pzat24kLdO3o8ejmbLxyOac.jpg",
    banner: "https://image.tmdb.org/t/p/original/9BBTo63ANSmhC4e6r62OJFuK2GL.jpg"
  }
];

// Banner inicial
document.getElementById("banner").style.backgroundImage =
  `url(${movies[0].banner})`;

document.getElementById("title").innerText = movies[0].title;
document.getElementById("desc").innerText = movies[0].desc;

// Renderizar filmes
function render(rowId) {
  const row = document.getElementById(rowId);

  movies.forEach(movie => {
    const img = document.createElement("img");
    img.src = movie.img;

    img.onclick = () => openModal(movie);

    row.appendChild(img);
  });
}

render("row1");
render("row2");

// Modal
function openModal(movie) {
  document.getElementById("modal").style.display = "flex";
  document.getElementById("modal-title").innerText = movie.title;
  document.getElementById("modal-desc").innerText = movie.desc;
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}
</script>

</body>
</html>
