<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Netflix Clone</title>

<style>
body {
  margin: 0;
  background: #141414;
  color: white;
  font-family: Arial, sans-serif;
}

header {
  padding: 20px;
  font-size: 24px;
  color: red;
  font-weight: bold;
}

.banner {
  height: 60vh;
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: flex-end;
  padding: 20px;
}

.banner h1 {
  font-size: 40px;
}

.row {
  padding: 20px;
}

.movies {
  display: flex;
  overflow-x: auto;
  gap: 10px;
}

.movies img {
  width: 150px;
  border-radius: 8px;
  transition: 0.3s;
  cursor: pointer;
}

.movies img:hover {
  transform: scale(1.1);
}

::-webkit-scrollbar {
  display: none;
}
</style>
</head>

<body>

<header>NETFLIX</header>

<div class="banner" id="banner">
  <h1 id="banner-title">Carregando...</h1>
</div>

<div class="row">
  <h2>🔥 Em Alta</h2>
  <div class="movies" id="trending"></div>
</div>

<div class="row">
  <h2>⭐ Mais Bem Avaliados</h2>
  <div class="movies" id="toprated"></div>
</div>

<script>
const API_KEY = "SUA_API_AQUI";
const BASE_URL = "https://api.themoviedb.org/3";

async function fetchMovies(url) {
  const res = await fetch(url);
  const data = await res.json();
  return data.results;
}

function displayMovies(movies, elementId) {
  const container = document.getElementById(elementId);
  container.innerHTML = "";

  movies.forEach(movie => {
    if (!movie.poster_path) return;

    const img = document.createElement("img");
    img.src = "https://image.tmdb.org/t/p/w300" + movie.poster_path;
    img.title = movie.title;

    container.appendChild(img);
  });
}

function setBanner(movie) {
  const banner = document.getElementById("banner");
  const title = document.getElementById("banner-title");

  banner.style.backgroundImage =
    "url(https://image.tmdb.org/t/p/original" + movie.backdrop_path + ")";
  title.textContent = movie.title;
}

async function init() {
  try {
    const trending = await fetchMovies(
      `${BASE_URL}/trending/movie/week?api_key=${API_KEY}`
    );

    const topRated = await fetchMovies(
      `${BASE_URL}/movie/top_rated?api_key=${API_KEY}`
    );

    displayMovies(trending, "trending");
    displayMovies(topRated, "toprated");

    setBanner(trending[0]);

  } catch (error) {
    console.error("Erro:", error);
    document.body.innerHTML = "<h1>Erro ao carregar dados 😢</h1>";
  }
}

init();
</script>

</body>
</html>
