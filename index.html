<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luis Gustavo | Projetos</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

header {
  text-align: center;
  padding: 60px 20px;
  background: linear-gradient(135deg, #ff6b35, #ff8c42);
}

section {
  max-width: 1100px;
  margin: auto;
  padding: 40px 20px;
}

.projects {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-8px);
}

.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 8px 14px;
  border-radius: 20px;
  text-decoration: none;
  font-size: 14px;
}

.demo {
  background: #ff6b35;
  color: white;
}

.code {
  border: 1px solid #ff6b35;
  color: #ff6b35;
}

</style>
</head>

<body>

<header>
  <h1>Luis Gustavo</h1>
  <p>Projetos funcionando</p>
</header>

<section>
<h2>🚀 Projetos</h2>

<div class="projects">

<!-- DASHBOARD -->
<div class="card">
  <h3>📊 Dashboard de Dados</h3>
  <p>Visualização com gráficos</p>
  <!-- CORRIGIDO -->
  <a href="./dashboard/index.html" class="btn demo">🔗 Abrir</a>
</div>

<!-- LOGIN -->
<div class="card">
  <h3>🔐 Sistema de Login</h3>
  <p>Simulação de autenticação</p>
  <!-- CORRIGIDO -->
  <a href="./login/index.html" class="btn demo">🔗 Abrir</a>
</div>

<!-- APP -->
<div class="card">
  <h3>⚙️ Projeto Web</h3>
  <p>Aplicação front-end</p>
  <!-- CORRIGIDO -->
  <a href="./app/index.html" class="btn demo">🔗 Abrir</a>
</div>

</div>

</section>

</body>
</html>
