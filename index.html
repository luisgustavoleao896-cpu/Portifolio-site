<script>
  // ============================================
  // 🎯 CONFIGURAÇÃO GLOBAL
  // ============================================
  const CONFIG = {
    apiBase: 'https://jsonplaceholder.typicode.com',
    tmdbMock: true, // Usar dados mockados para evitar CORS do TMDB [[3]][[6]]
    animations: true,
    debug: false
  };

  // ============================================
  // 📱 MENU MOBILE
  // ============================================
  const navToggle = document.getElementById('navToggle');
  const navLinks = document.getElementById('navLinks');
  
  navToggle?.addEventListener('click', () => {
    navLinks.classList.toggle('active');
    navToggle.textContent = navLinks.classList.contains('active') ? '✕' : '☰';
  });

  // Fechar menu ao clicar em link
  document.querySelectorAll('.navbar-links a').forEach(link => {
    link.addEventListener('click', () => {
      navLinks.classList.remove('active');
      navToggle.textContent = '☰';
    });
  });

  // ============================================
  // 🎬 NETFLIX DEMO - ULTRA-REALISTA
  // ============================================
  const netflixContent = document.getElementById('netflix-content');
  
  // Dados mockados realistas (evita CORS do TMDB [[9]])
  const netflixData = {
    trending: [
      { id: 1, title: "Stranger Things", year: 2016, rating: "98%", img: "🔮", genre: "Sci-Fi", desc: "Quando um garoto desaparece, uma cidade inteira é envolvida em mistérios sobrenaturais." },
      { id: 2, title: "The Crown", year: 2016, rating: "95%", img: "👑", genre: "Drama", desc: "A narrativa épica da rainha Elizabeth II e os eventos que moldaram a segunda metade do século XX." },
      { id: 3, title: "Money Heist", year: 2017, rating: "97%", img: "💰", genre: "Crime", desc: "Um grupo único de assaltantes invade a Casa da Moeda da Espanha em um plano elaborado." },
      { id: 4, title: "Dark", year: 2017, rating: "96%", img: "🌀", genre: "Thriller", desc: "Uma família descobre segredos sombrios em uma cidade alemã após o desaparecimento de duas crianças." },
      { id: 5, title: "Ozark", year: 2017, rating: "94%", img: "💵", genre: "Crime", desc: "Um consultor financeiro lava dinheiro para um cartel enquanto tenta manter sua família segura." },
      { id: 6, title: "Bridgerton", year: 2020, rating: "92%", img: "🌹", genre: "Romance", desc: "Oito irmãos unidos pela família buscam amor e felicidade na alta sociedade londrina." }
    ],
    originals: [
      { id: 7, title: "Wednesday", year: 2022, rating: "93%", img: "🖤", genre: "Comédia", desc: "Wednesday Addams investiga mistérios sobrenaturais em sua nova escola." },
      { id: 8, title: "Squid Game", year: 2021, rating: "99%", img: "🔺", genre: "Thriller", desc: "Centenas de jogadores endividados aceitam um convite mortal para competir em jogos infantis." }
    ]
  };

  function renderNetflix() {
    const createCard = (movie) => `
      <div class="nf-card ${movie.id % 3 === 0 ? 'red' : movie.id % 3 === 1 ? 'blue' : 'green'}" 
           onclick="showMovieDetails(${JSON.stringify(movie).replace(/"/g, '&quot;')})"
           style="cursor: pointer;"
           title="Clique para ver detalhes">
        <div style="font-size: 2rem; margin-bottom: 8px;">${movie.img}</div>
        <div style="font-size: 0.7rem; text-align: center;">${movie.title}</div>
      </div>
    `;

    let html = `
      <div class="nf-nav">
        <div class="nf-logo">NETFLIX</div>
        <div style="display: flex; gap: 15px; align-items: center;">
          <span style="font-size: 0.8rem; cursor: pointer;" onclick="alert('🔍 Busca em desenvolvimento')">🔍</span>
          <span style="font-size: 0.8rem; cursor: pointer;" onclick="alert('🔔 Notificações')">🔔</span>
          <div style="width: 24px; height: 24px; background: #e50914; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; cursor: pointer;" onclick="alert('👤 Perfil')">👤</div>
        </div>
      </div>
      
      <div class="nf-hero">
        <div class="nf-content">
          <div style="display: flex; gap: 8px; margin-bottom: 12px;">
            <span class="badge" style="background: #e50914; border-color: #e50914; color: white;">NETFLIX ORIGINAL</span>
            <span class="badge" style="background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.3); color: white;">98% Match</span>
          </div>
          <div class="nf-title">Stranger Things</div>
          <div class="nf-desc">Quando um garoto desaparece, a cidade toda participa nas buscas. Mistérios sobrenaturais, amizade e coragem em uma jornada épica.</div>
          <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <button class="nf-btn" onclick="playDemo('Stranger Things')">▶ Play</button>
            <button class="nf-btn" style="background: rgba(109, 109, 110, 0.7);" onclick="alert('✅ Adicionado à Minha Lista')">+ Minha Lista</button>
          </div>
        </div>
      </div>
      
      <div class="nf-row">
        <h4>🔥 Em Alta Agora</h4>
        <div class="nf-row-inner">
          ${netflixData.trending.map(createCard).join('')}
        </div>
      </div>
      
      <div class="nf-row">
        <h4>🎬 Originais Netflix</h4>
        <div class="nf-row-inner">
          ${netflixData.originals.map(createCard).join('')}
        </div>
      </div>
      
      <!-- Modal de Detalhes (oculto por padrão) -->
      <div id="movie-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px;">
        <div style="background: #141414; border-radius: 12px; max-width: 500px; width: 100%; padding: 24px; position: relative;">
          <button onclick="closeModal()" style="position: absolute; top: 12px; right: 12px; background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer;">✕</button>
          <div id="modal-content"></div>
        </div>
      </div>
    `;
    
    netflixContent.innerHTML = html;
    
    // Efeito de hover nas cards
    document.querySelectorAll('.nf-card').forEach(card => {
      card.addEventListener('mouseenter', function() {
        this.style.transform = 'scale(1.15)';
        this.style.zIndex = '10';
        this.style.boxShadow = '0 10px 40px rgba(0,0,0,0.5)';
      });
      card.addEventListener('mouseleave', function() {
        this.style.transform = 'scale(1)';
        this.style.zIndex = '1';
        this.style.boxShadow = 'none';
      });
    });
  }

  function showMovieDetails(movie) {
    const modal = document.getElementById('movie-modal');
    const content = document.getElementById('modal-content');
    
    content.innerHTML = `
      <div style="font-size: 3rem; margin-bottom: 16px;">${movie.img}</div>
      <h3 style="margin-bottom: 8px;">${movie.title}</h3>
      <div style="display: flex; gap: 12px; color: #b3b3b3; font-size: 0.9rem; margin-bottom: 16px;">
        <span>${movie.year}</span>
        <span>•</span>
        <span>${movie.genre}</span>
        <span>•</span>
        <span style="color: #46d369;">${movie.rating}</span>
      </div>
      <p style="color: #d2d2d2; line-height: 1.5; margin-bottom: 24px;">${movie.desc}</p>
      <div style="display: flex; gap: 10px;">
        <button class="nf-btn" onclick="playDemo('${movie.title}')">▶ Assistir</button>
        <button class="nf-btn" style="background: rgba(109, 109, 110, 0.7);" onclick="alert('✅ ${movie.title} adicionado à lista!')">+ Lista</button>
      </div>
    `;
    
    modal.style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('movie-modal').style.display = 'none';
    document.body.style.overflow = 'auto';
  }

  function playDemo(title) {
    // Simula carregamento de vídeo
    const btn = event.target;
    const originalText = btn.innerHTML;
    btn.innerHTML = '⏳ Carregando...';
    btn.disabled = true;
    
    setTimeout(() => {
      alert(`🎬 Iniciando "${title}"...\n\n⚠️ Esta é uma demo interativa!\n\nEm produção, aqui seria integrado com:\n• Player de vídeo HTML5\n• API de streaming\n• Sistema de recomendação`);
      btn.innerHTML = originalText;
      btn.disabled = false;
    }, 1500);
  }

  // Fechar modal ao clicar fora
  document.addEventListener('click', (e) => {
    const modal = document.getElementById('movie-modal');
    if (e.target === modal) closeModal();
  });

  // ============================================
  // 🔐 AUTH SYSTEM - FLUXO REALISTA COM JWT
  // ============================================
  const authContent = document.getElementById('auth-content');
  
  // Simula "banco de dados" de usuários
  const mockUsers = [
    { email: 'admin@demo.com', password: '123456', name: 'Admin User', token: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.mock' },
    { email: 'user@demo.com', password: 'senha123', name: 'Test User', token: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.mock2' }
  ];

  // Verifica sessão ao carregar
  function checkSession() {
    const session = localStorage.getItem('auth_session');
    if (session) {
      const userData = JSON.parse(session);
      // Verifica se token não "expirou" (simulação de 24h)
      if (Date.now() - userData.timestamp < 24 * 60 * 60 * 1000) {
        return userData;
      }
      localStorage.removeItem('auth_session');
    }
    return null;
  }

  function renderAuth() {
    const user = checkSession();
    
    if (!user) {
      authContent.innerHTML = `
        <div class="login-box">
          <h3 style="text-align: center; margin-bottom: 8px;">🔐 Acesso Seguro</h3>
          <p style="text-align: center; color: #64748b; font-size: 0.85rem; margin-bottom: 20px;">Demo com JWT simulado</p>
          
          <form id="login-form" onsubmit="handleLogin(event)">
            <div style="margin-bottom: 16px;">
              <label style="display: block; font-size: 0.85rem; margin-bottom: 6px; color: #64748b;">Email</label>
              <input type="email" id="email" class="login-input" placeholder="admin@demo.com" required 
                     style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.95rem;">
            </div>
            <div style="margin-bottom: 20px;">
              <label style="display: block; font-size: 0.85rem; margin-bottom: 6px; color: #64748b;">Senha</label>
              <input type="password" id="password" class="login-input" placeholder="••••••" required
                     style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.95rem;">
            </div>
            
            <div id="login-error" style="color: #ef4444; font-size: 0.85rem; margin-bottom: 12px; display: none;"></div>
            
            <button type="submit" class="login-btn" id="login-btn">Entrar</button>
          </form>
          
          <div style="margin-top: 20px; padding-top: 16px; border-top: 1px solid #e2e8f0; font-size: 0.8rem; color: #64748b;">
            <strong>Credenciais de teste:</strong><br>
            📧 admin@demo.com / 🔑 123456<br>
            📧 user@demo.com / 🔑 senha123
          </div>
        </div>
      `;
    } else {
      // Decodifica mock JWT para display
      const tokenParts = user.token.split('.');
      const mockPayload = {
        sub: user.email,
        name: user.name,
        iat: Math.floor(user.timestamp / 1000),
        exp: Math.floor(user.timestamp / 1000) + 86400
      };
      
      authContent.innerHTML = `
        <div class="login-success">
          <div class="icon">✅</div>
          <h3>Autenticado!</h3>
          <p style="color: #64748b; margin: 8px 0;">Bem-vindo, <strong>${user.name}</strong></p>
          
          <div style="background: #f8fafc; border-radius: 8px; padding: 12px; margin: 16px 0; font-family: monospace; font-size: 0.75rem; text-align: left; max-height: 150px; overflow: auto;">
            <div style="color: #64748b; margin-bottom: 4px;">🔑 Token JWT (mock):</div>
            <div style="word-break: break-all; color: #3b82f6;">${user.token.substring(0, 40)}...</div>
          </div>
          
          <div style="background: #f8fafc; border-radius: 8px; padding: 12px; margin: 16px 0; font-size: 0.8rem; text-align: left;">
            <div style="color: #64748b; margin-bottom: 4px;">📋 Payload Decodificado:</div>
            <pre style="margin: 0; white-space: pre-wrap;">${JSON.stringify(mockPayload, null, 2)}</pre>
          </div>
          
          <button class="login-btn" style="background:#ef4444;" onclick="handleLogout()">🚪 Sair</button>
        </div>
      `;
    }
  }

  async function handleLogin(e) {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errorEl = document.getElementById('login-error');
    const btn = document.getElementById('login-btn');
    
    // UI Loading state
    btn.innerHTML = '🔄 Autenticando...';
    btn.disabled = true;
    errorEl.style.display = 'none';
    
    // Simula delay de rede (realista)
    await new Promise(resolve => setTimeout(resolve, 1200));
    
    // Valida credenciais
    const user = mockUsers.find(u => u.email === email && u.password === password);
    
    if (user) {
      // "Gera" token JWT mockado
      const sessionData = {
        email: user.email,
        name: user.name,
        token: user.token,
        timestamp: Date.now()
      };
      
      // Salva sessão (simula localStorage + httpOnly cookie)
      localStorage.setItem('auth_session', JSON.stringify(sessionData));
      
      // Feedback visual de sucesso
      btn.innerHTML = '✅ Sucesso!';
      btn.style.background = '#10b981';
      
      setTimeout(() => {
        renderAuth();
      }, 800);
    } else {
      // Feedback de erro
      errorEl.textContent = '❌ Email ou senha inválidos';
      errorEl.style.display = 'block';
      
      // Shake animation no form
      const form = document.getElementById('login-form');
      form.style.animation = 'shake 0.3s';
      setTimeout(() => form.style.animation = '', 300);
      
      btn.innerHTML = 'Entrar';
      btn.disabled = false;
    }
  }

  function handleLogout() {
    localStorage.removeItem('auth_session');
    
    // Feedback visual
    const btn = event.target;
    btn.innerHTML = '🚪 Saindo...';
    btn.disabled = true;
    
    setTimeout(() => {
      renderAuth();
      alert('👋 Sessão encerrada com sucesso!');
    }, 500);
  }

  // Adiciona animação de shake via CSS dinâmico
  const style = document.createElement('style');
  style.textContent = `
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
  `;
  document.head.appendChild(style);

  // ============================================
  // 🌐 API CONSUMER - FETCH REAL COM TRATAMENTO
  // ============================================
  async function runApiDemo() {
    const output = document.getElementById('api-output');
    const urlInput = document.getElementById('api-url');
    const url = urlInput?.value || 'https://jsonplaceholder.typicode.com/posts/1';
    
    // UI Loading com skeleton
    output.innerHTML = `
      <div style="color: #f59e0b;">
        <span style="display: inline-block; animation: pulse 1.5s infinite;">⚡</span> 
        Conectando a ${new URL(url).hostname}...
      </div>
      <div style="margin-top: 12px; color: #64748b; font-size: 0.85rem;">
        <div style="background: #2a2a2a; height: 12px; border-radius: 4px; margin: 4px 0; animation: pulse 1.5s infinite;"></div>
        <div style="background: #2a2a2a; height: 12px; border-radius: 4px; margin: 4px 0; animation: pulse 1.5s infinite 0.2s;"></div>
        <div style="background: #2a2a2a; height: 12px; border-radius: 4px; margin: 4px 0; animation: pulse 1.5s infinite 0.4s;"></div>
      </div>
    `;
    
    // Adiciona animação pulse se não existir
    if (!document.querySelector('#pulse-animation')) {
      const pulseStyle = document.createElement('style');
      pulseStyle.id = 'pulse-animation';
      pulseStyle.textContent = `
        @keyframes pulse {
          0%, 100% { opacity: 1; }
          50% { opacity: 0.5; }
        }
      `;
      document.head.appendChild(pulseStyle);
    }
    
    try {
      // Usa JSONPlaceholder para evitar CORS [[12]][[13]]
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 8000);
      
      const startTime = performance.now();
      const response = await fetch(url, { 
        method: 'GET',
        headers: { 'Accept': 'application/json' },
        signal: controller.signal
      });
      const endTime = performance.now();
      clearTimeout(timeout);
      
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
      }
      
      const data = await response.json();
      const responseTime = Math.round(endTime - startTime);
      
      // Formata resposta com syntax highlighting mockado
      const formatted = JSON.stringify(data, null, 2)
        .replace(/"([^"]+)":/g, '<span style="color: #9cdcfe;">"$1"</span>:')
        .replace(/: "([^"]*)"/g, ': <span style="color: #ce9178;">"$1"</span>')
        .replace(/: (\d+)/g, ': <span style="color: #b5cea8;">$1</span>')
        .replace(/: (true|false)/g, ': <span style="color: #569cd6;">$1</span>');
      
      output.innerHTML = `
        <div style="color: #46d369; margin-bottom: 12px; display: flex; align-items: center; gap: 8px;">
          ✅ <span>200 OK</span>
          <span style="color: #64748b; font-size: 0.8rem;">• ${responseTime}ms</span>
          <span style="color: #64748b; font-size: 0.8rem;">• ${new Blob([JSON.stringify(data)]).size} bytes</span>
        </div>
        <div style="border-top: 1px solid #333; padding-top: 12px;">${formatted}</div>
      `;
      
    } catch (error) {
      let errorMsg = error.message;
      
      if (error.name === 'AbortError') {
        errorMsg = '⏱️ Timeout: Requisição demorou mais de 8s';
      } else if (error.message.includes('Failed to fetch')) {
        errorMsg = '🌐 Erro de Conexão: Verifique sua internet ou CORS';
      }
      
      output.innerHTML = `
        <div style="color: #ef4444; margin-bottom: 12px;">❌ Erro na Requisição</div>
        <div style="background: rgba(239, 68, 68, 0.1); border-left: 3px solid #ef4444; padding: 12px; border-radius: 0 6px 6px 0;">
          <code style="color: #fca5a5;">${errorMsg}</code>
        </div>
        <div style="margin-top: 12px; font-size: 0.85rem; color: #94a3b8;">
          💡 <strong>Dica:</strong> Este demo usa <a href="https://jsonplaceholder.typicode.com" target="_blank" style="color: #3b82f6;">JSONPlaceholder</a> [[12]]<br>
          que funciona sem CORS para fins educacionais.
        </div>
      `;
    }
  }

  // ============================================
  // 🎯 INICIALIZAÇÃO
  // ============================================
  document.addEventListener('DOMContentLoaded', () => {
    // Renderiza demos
    renderNetflix();
    renderAuth();
    
    // Configura inputs da API demo
    const apiInput = document.getElementById('api-url');
    if (apiInput) {
      apiInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') runApiDemo();
      });
    }
    
    // Smooth scroll para links internos
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function(e) {
        e.preventDefault();
        const target = document.querySelector(this.getAttribute('href'));
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      });
    });
    
    // Feedback visual ao rolar navbar
    window.addEventListener('scroll', () => {
      const navbar = document.querySelector('.navbar');
      if (window.scrollY > 50) {
        navbar.style.background = 'rgba(15, 23, 42, 0.98)';
        navbar.style.boxShadow = '0 4px 20px rgba(0,0,0,0.3)';
      } else {
        navbar.style.background = 'rgba(15, 23, 42, 0.95)';
        navbar.style.boxShadow = 'none';
      }
    });
    
    // Console Easter Egg para recrutadores 😉
    console.log('%c👋 Olá, recrutador!', 'font-size: 16px; font-weight: bold; color: #3b82f6;');
    console.log('%cEste portfolio foi desenvolvido por Luis Gustavo.', 'color: #94a3b8;');
    console.log('%c🔗 GitHub: https://github.com/luisgustavoleao896-cpu', 'color: #10b981;');
    console.log('%c💡 Dica: As demos acima são 100% funcionais no navegador!', 'color: #f59e0b;');
  });
</script>
