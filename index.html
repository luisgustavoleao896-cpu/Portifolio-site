<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luis Gustavo | Desenvolvedor</title>

<style>
:root {
  --primary: #ff6b35;
  --bg: #ffffff;
  --text: #1f1f1f;
  --card: #ffffff;
}

body.dark {
  --bg: #0f172a;
  --text: #e5e7eb;
  --card: #1e293b;
}

body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: all 0.3s ease;
}

header {
  padding: 60px 20px;
  text-align: center;
  background: linear-gradient(135deg, #ff6b35, #ff8c42);
  color: white;
}

header img {
  width: 120px;
  border-radius: 50%;
}

nav {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 15px;
  background: var(--card);
  position: sticky;
  top: 0;
}

nav a {
  text-decoration: none;
  color: var(--text);
  font-weight: bold;
}

.toggle {
  position: absolute;
  right: 20px;
  cursor: pointer;
}

section {
  max-width: 1000px;
  margin: auto;
  padding: 40px 20px;
}

.projects {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
}

.card {
  background: var(--card);
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.btn {
  display: inline-block;
  margin-top: 10px;
  padding: 8px 15px;
  border-radius: 20px;
  text-decoration: none;
}

.btn-demo {
  background: var(--primary);
  color: white;
}

.btn-code {
  border: 1px solid var(--primary);
  color: var(--primary);
}

.filter {
  text-align: center;
  margin-bottom: 20px;
}

.filter button {
  margin: 5px;
  padding: 8px 15px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
}

footer {
  text-align: center;
  padding: 20px;
}
</style>
</head>

<body>

<header>
  <img src="perfil.jpg">
  <h1>Luis Gustavo</h1>
  <p>Desenvolvedor Web</p>
</header>

<nav>
  <a href="#sobre">Sobre</a>
  <a href="#projetos">Projetos</a>
  <a href="#contato">Contato</a>
  <span class="toggle" onclick="toggleDark()">🌙</span>
</nav>

<section id="sobre">
  <h2>Sobre</h2>
  <p>Desenvolvedor focado em aplicações web modernas.</p>
</section>

<section id="projetos">
  <h2>Projetos</h2>

  <div class="filter">
    <button onclick="filter('all')">Todos</button>
    <button onclick="filter('front')">Front-end</button>
    <button onclick="filter('back')">Back-end</button>
  </div>

  <div class="projects">

    <div class="card front">
      <h3>Portfólio</h3>
      <a href="https://luisgustavoleao896-cpu.github.io/Portifolio-site/" class="btn btn-demo">Demo</a>
      <a href="https://github.com/luisgustavoleao896-cpu/Portifolio-site" class="btn btn-code">Código</a>
    </div>

    <div class="card front">
      <h3>Minhas Tarefas</h3>
      <a href="https://luisgustavoleao896-cpu.github.io/Minhas-tarefas" class="btn btn-demo">Demo</a>
      <a href="https://github.com/luisgustavoleao896-cpu/Minhas-tarefas" class="btn btn-code">Código</a>
    </div>

    <div class="card back">
      <h3>API PHP</h3>
      <a href="https://github.com/luisgustavoleao896-cpu/api-rest-php" class="btn btn-code">Código</a>
    </div>

  </div>
</section>

<section id="contato">
  <h2>Contato</h2>
  <p>Email: gustavoluis.v.c.1016@gmail.com</p>
</section>

<footer>
  <p>© 2026 Luis Gustavo</p>
</footer>

<script>
function toggleDark() {
  document.body.classList.toggle('dark');
}

function filter(type) {
  const cards = document.querySelectorAll('.card');
  cards.forEach(card => {
    if (type === 'all') {
      card.style.display = 'block';
    } else {
      card.style.display = card.classList.contains(type) ? 'block' : 'none';
    }
  });
}
</script>

</body>
</html>
